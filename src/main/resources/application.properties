spring.application.name=personalized-data-api
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/personalization_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysql}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
